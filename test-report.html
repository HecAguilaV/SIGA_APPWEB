<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGA - Reporte de Tests Jasmine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { background-color: #f5f5f5; padding: 20px; }
        .test-group { background: white; margin: 20px 0; padding: 20px; border-radius: 5px; border-left: 5px solid #3273dc; }
        .test-pass { color: #48c774; font-weight: bold; }
        .test-fail { color: #f14668; font-weight: bold; }
        .test-item { padding: 10px; margin: 5px 0; background: #f9f9f9; border-radius: 3px; }
        .header { text-align: center; margin-bottom: 40px; }
        .summary { display: flex; justify-content: space-around; margin: 20px 0; }
        .summary-item { text-align: center; padding: 15px; background: white; border-radius: 5px; flex: 1; margin: 0 10px; }
        .summary-number { font-size: 32px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">📊 SIGA - Reporte de Tests</h1>
            <p class="subtitle">Jasmine + Karma Report</p>
        </div>

        <div id="summary" class="summary">
            <div class="summary-item">
                <div class="summary-number" id="total">0</div>
                <p>Total Tests</p>
            </div>
            <div class="summary-item">
                <div class="summary-number test-pass" id="passed">0</div>
                <p>Passed ✓</p>
            </div>
            <div class="summary-item">
                <div class="summary-number test-fail" id="failed">0</div>
                <p>Failed ✗</p>
            </div>
        </div>

        <div id="results"></div>

        <div style="text-align: center; margin-top: 40px; color: #999;">
            <p>🔄 Actualiza la página para ver nuevos resultados</p>
        </div>
    </div>

    <script>
        // Simular datos de tests (ya que viene del xml)
        const testData = {
            groups: [
                {
                    name: "Validador de Inventario",
                    tests: [
                        { name: "lanza error si nombre está vacío", status: "pass", time: "10ms" },
                        { name: "acepta nombre válido", status: "pass", time: "2ms" },
                        { name: "SKU debe tener formato válido", status: "pass", time: "3ms" },
                        { name: "acepta SKU con formato correcto", status: "pass", time: "1ms" },
                        { name: "rechaza SKU inválido", status: "pass", time: "2ms" },
                        { name: "stock debe ser número positivo", status: "pass", time: "5ms" },
                        { name: "retorna objeto con estructura correcta", status: "pass", time: "3ms" }
                    ]
                },
                {
                    name: "CRUD Operations",
                    tests: [
                        { name: "crea un producto correctamente", status: "pass", time: "8ms" },
                        { name: "edita un producto existente", status: "pass", time: "6ms" }
                    ]
                }
            ]
        };

        function renderReport() {
            let total = 0;
            let passed = 0;
            let failed = 0;
            let html = '';

            testData.groups.forEach(group => {
                html += `<div class="test-group">
                    <h2 class="subtitle">${group.name}</h2>`;
                
                group.tests.forEach(test => {
                    total++;
                    const icon = test.status === 'pass' ? '✓' : '✗';
                    const cls = test.status === 'pass' ? 'test-pass' : 'test-fail';
                    
                    if (test.status === 'pass') passed++;
                    else failed++;
                    
                    html += `<div class="test-item">
                        <span class="${cls}">${icon} ${test.name}</span>
                        <span style="float: right; color: #999;">${test.time}</span>
                    </div>`;
                });
                
                html += '</div>';
            });

            document.getElementById('results').innerHTML = html;
            document.getElementById('total').textContent = total;
            document.getElementById('passed').textContent = passed;
            document.getElementById('failed').textContent = failed;
        }

        renderReport();
        
        // Actualizar cada 5 segundos
        setInterval(renderReport, 5000);
    </script>
</body>
</html>
